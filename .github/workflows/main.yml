name: 🚀 Local Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 📁 Go to Project
        run: |
          cd ~/apartment-app

      - name: 📥 Pull Latest Code
        run: |
          cd ~/apartment-app
          git pull origin main

      - name: 📦 Install Frontend
        run: |
          cd ~/apartment-app/frontend
          npm install

      - name: 🏗️ Build Frontend
        run: |
          cd ~/apartment-app/frontend
          npm run build

      - name: 🔄 Restart App
        run: |
          pm2 restart all || echo "pm2 not running"
